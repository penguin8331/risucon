services:
  db:
    image: mysql:8.0.45
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: risucontest
      MYSQL_USER: risucon
      MYSQL_PASSWORD: risucon
    volumes:
      - ./sql/00_schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./sql/01_initial_data.prod.sql:/docker-entrypoint-initdb.d/01_initial_data.sql:ro
      - db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      RISUCON_DB_HOST: db
      RISUCON_DB_PORT: "3306"
      RISUCON_DB_USER: risucon
      RISUCON_DB_PASSWORD: risucon
      RISUCON_DB_NAME: risucontest
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.28.3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  db-data:
